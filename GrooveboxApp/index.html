<!DOCTYPE html>
<script src="http://unpkg.com/tone"></script>
<script>const synth = new Tone.Synth().toDestination();</script>
<script>
	function getNote() {
		const note1pitch = document.getElementById('pitch1-input').value;
		
		alert(note1pitch);
	}
	
	
	function playNote(userNote1) {
		synth.triggerAttackRelease(userNote1, '8n')
	}

	document.getElementById.('pitch1-input').onclick.value="Submit";
	
	var note2pitch = 'A2';
	
</script>
	
<html>
<body>

<form>
  <label for="fname">Note Button 1</label><br>
  <input type="text" id="pitch1-input" name="pitch1-input" maxlength="3" size="3" value="C4"><br>
  <input type="submit" value="Submit" onclick="getNote()">
</form>

<button type="button"
onclick="playNote(note1pitch)"</button>

<br>

<!--This will play a note, but it doesn't ever stop playing it for some reason -->
<button type="button"
onclick="synth.triggerAttackRelease('note2pitch', '8n')">Sound</button

</body>
</html>
