<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Piano keyboard -->
  <rect x="20" y="60" width="160" height="100" fill="#1a1a1a" stroke="#fff" stroke-width="2" rx="4"/>
  
  <!-- White keys -->
  <g fill="#f0f0f0" stroke="#333" stroke-width="1">
    <rect x="30" y="70" width="18" height="80" rx="2"/>
    <rect x="50" y="70" width="18" height="80" rx="2"/>
    <rect x="70" y="70" width="18" height="80" rx="2"/>
    <rect x="90" y="70" width="18" height="80" rx="2"/>
    <rect x="110" y="70" width="18" height="80" rx="2"/>
    <rect x="130" y="70" width="18" height="80" rx="2"/>
    <rect x="150" y="70" width="18" height="80" rx="2"/>
  </g>
  
  <!-- Black keys -->
  <g fill="#333" stroke="#000" stroke-width="1">
    <rect x="43" y="70" width="12" height="50" rx="1"/>
    <rect x="63" y="70" width="12" height="50" rx="1"/>
    <rect x="103" y="70" width="12" height="50" rx="1"/>
    <rect x="123" y="70" width="12" height="50" rx="1"/>
    <rect x="143" y="70" width="12" height="50" rx="1"/>
  </g>
  
  <!-- Piano lid -->
  <line x1="50" y1="60" x2="150" y2="30" stroke="#8B7355" stroke-width="3"/>
  
  <!-- Label -->
  <text x="100" y="180" font-size="16" font-weight="bold" text-anchor="middle" fill="#fff">PIANO</text>
</svg>
