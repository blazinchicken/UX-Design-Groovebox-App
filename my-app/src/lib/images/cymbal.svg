<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Cymbal plate -->
  <circle cx="100" cy="90" r="60" fill="#FFD700" stroke="#DAA520" stroke-width="2"/>
  
  <!-- Cymbal texture rings -->
  <g stroke="#DAA520" stroke-width="0.5" fill="none" opacity="0.6">
    <circle cx="100" cy="90" r="40"/>
    <circle cx="100" cy="90" r="30"/>
    <circle cx="100" cy="90" r="20"/>
  </g>
  
  <!-- Center cup -->
  <circle cx="100" cy="90" r="12" fill="#FFD700" stroke="#B8860B" stroke-width="1.5"/>
  
  <!-- Drum stick striking effect -->
  <line x1="80" y1="50" x2="95" y2="75" stroke="#8B4513" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <circle cx="78" cy="48" r="3" fill="#8B4513"/>
  
  <!-- Shine/reflection -->
  <ellipse cx="75" cy="60" rx="20" ry="25" fill="#FFF" opacity="0.2"/>
  
  <!-- Label -->
  <text x="100" y="180" font-size="16" font-weight="bold" text-anchor="middle" fill="#fff">CYMBAL</text>
</svg>
